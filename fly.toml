# Fly.io - Aurix (backend + frontend) em São Paulo
# Sempre na RAIZ do repositório: fly deploy
# (Inclui build do Vite em backend/dist/public; não deployar só de backend/.)

app = "aurix-prod"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  UPLOADS_DIR = "/data/uploads"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "aurix_data"
  destination = "/data"
