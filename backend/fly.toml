# Fly.io - Backend Aurix em São Paulo (gru)
# ATENÇÃO: este Dockerfile NÃO inclui o build do React. Para o site (SPA) atualizado,
# faça deploy na RAIZ do repositório: `fly deploy` (app aurix-prod, Dockerfile na raiz).
# Só use este app/folder se quiser API-only de propósito.
#
# Use: fly launch (já com este arquivo) ou fly deploy
# Região: gru = São Paulo, Brasil
#
# Obrigatório (secrets — NÃO colocar aspas no valor):
#   fly secrets set DATABASE_URL="postgresql://postgres.PROJETO:SENHA@aws-0-REGIAO.pooler.supabase.com:6543/postgres"
#   fly secrets set JWT_SECRET="(32+ caracteres)"
#   fly secrets set FRONTEND_URL="https://seu-frontend.vercel.app"
# Copie a URI do Supabase: Transaction pooling (6543), usuário postgres.ref — igual ao .env.local de dev.

app = "aurix-backend"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "3001"
  UPLOADS_DIR = "/data/uploads"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[[mounts]]
  source = "aurix_data"
  destination = "/data"
